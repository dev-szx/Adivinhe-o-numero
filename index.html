<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎯 Jogo de Adivinhação</h1>

        <p class="instrucao">
            Tente adivinhar o número secreto entre 1 e 100.
            Você possui 10 tentativas.
        </p>

        <input
            type="number"
            id="palpite"
            placeholder="Digite um número de 1 a 100"
            min="1"
            max="100"
        >

        <button id="btnChutar">Chutar</button>

        <p id="mensagem"></p>
        <p id="tentativas">Tentativas restantes: 10</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
